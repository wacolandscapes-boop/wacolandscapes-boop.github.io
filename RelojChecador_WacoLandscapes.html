<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Reloj Waco">
    <meta name="mobile-web-app-capable" content="yes">
    <title>⏰ Reloj Checador - Waco Landscapes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #2d5016 0%, #4a7c2c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 4rem;
            margin-bottom: 10px;
        }
        
        h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        
        .clock {
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #2d5016;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }
        
        .date {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        
        /* LOGIN SCREEN */
        .login-screen {
            display: block;
        }
        
        .pin-display {
            background: #ecf0f1;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 2rem;
            letter-spacing: 10px;
            color: #2c3e50;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .key {
            background: #2d5016;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 30px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            min-height: 80px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }
        
        .key:hover {
            background: #4a7c2c;
            transform: scale(1.05);
        }
        
        .key:active {
            transform: scale(0.92);
            background: #7cb342;
        }
        
        .key.clear {
            background: #e74c3c;
        }
        
        .key.clear:hover {
            background: #c0392b;
        }
        
        .key.enter {
            background: #27ae60;
        }
        
        .key.enter:hover {
            background: #229954;
        }
        
        .error {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
        
        /* EMPLOYEE SCREEN */
        .employee-screen {
            display: none;
        }
        
        .welcome {
            background: linear-gradient(135deg, #2d5016 0%, #4a7c2c 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 25px;
        }
        
        .welcome h2 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .hours-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .hours-title {
            color: #2c3e50;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .hours-list {
            margin-bottom: 15px;
        }
        
        .hour-row {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #dee2e6;
        }
        
        .hour-row:last-child {
            border-bottom: none;
        }
        
        .hour-day {
            color: #495057;
            font-weight: 500;
        }
        
        .hour-value {
            color: #2d5016;
            font-weight: bold;
        }
        
        .total-hours {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        
        .total-label {
            font-weight: bold;
            color: #2c3e50;
        }
        
        .total-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #27ae60;
        }
        
        .last-entry {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 70px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .btn-in {
            background: #27ae60;
            color: white;
        }
        
        .btn-in:hover {
            background: #229954;
            transform: scale(1.05);
        }
        
        .btn-out {
            background: #e74c3c;
            color: white;
        }
        
        .btn-out:hover {
            background: #c0392b;
            transform: scale(1.05);
        }
        
        .btn-logout {
            background: #95a5a6;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
        }
        
        .btn-logout:hover {
            background: #7f8c8d;
        }
        
        .admin-btn {
            background: #34495e;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            margin-top: 20px;
        }
        
        .admin-btn:hover {
            background: #2c3e50;
        }
        
        .success-message {
            background: #27ae60;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
        /* iPad optimizations */
        @media (min-width: 768px) {
            .container {
                max-width: 520px;
                padding: 35px;
            }
            .key {
                padding: 26px;
                font-size: 1.8rem;
                min-height: 75px;
            }
            .btn {
                font-size: 1.3rem;
                min-height: 62px;
            }
            h1 {
                font-size: 1.8rem;
            }
            .pin-display {
                font-size: 2rem;
                padding: 15px;
            }
            .clock {
                font-size: 2.8rem;
            }
            .employee-name {
                font-size: 1.8rem;
            }
        }

        /* Prevent double-tap zoom on iOS */
        * {
            touch-action: manipulation;
        }
    </style>
</head>

    <script>
        const app = {
            pin: '',
            currentEmployee: null,
            adminPin: '0000', // PIN del administrador
            employees: [],
            attendances: [],
            workConfig: {
                startTime: '08:00',
                lateTolerance: 15
            },
            
            init() {
                this.loadData();
                this.updateClock();
                setInterval(() => this.updateClock(), 1000);
                
                // Datos de ejemplo
                if (this.employees.length === 0) {
                    this.employees = [
                        { id: 'emp001', name: 'Juan Pérez', pin: '1234', rate: 15 },
                        { id: 'emp002', name: 'María García', pin: '5678', rate: 12 },
                        { id: 'emp003', name: 'Pedro López', pin: '9999', rate: 14 }
                    ];
                    this.save();
                }
            },
            
            updateClock() {
                const now = new Date();
                const time = now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const date = now.toLocaleDateString('es-MX', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                
                document.getElementById('clock').textContent = time;
                document.getElementById('date').textContent = date;
            },
            
            addDigit(digit) {
                if (this.pin.length < 4) {
                    this.pin += digit;
                    this.updatePinDisplay();
                }
            },
            
            clearPin() {
                this.pin = '';
                this.updatePinDisplay();
                document.getElementById('errorMsg').style.display = 'none';
            },
            
            updatePinDisplay() {
                const display = document.getElementById('pinDisplay');
                if (this.pin.length === 0) {
                    display.textContent = 'Ingresa tu PIN';
                } else {
                    display.textContent = '•'.repeat(this.pin.length);
                }
            },
            
            verifyPin() {
                if (this.pin.length !== 4) {
                    this.showError('PIN debe tener 4 dígitos');
                    return;
                }
                
                // Verificar si es admin
                if (this.pin === this.adminPin) {
                    this.showAdminScreen();
                    return;
                }
                
                // Verificar si es empleado
                const employee = this.employees.find(e => e.pin === this.pin);
                
                if (employee) {
                    this.currentEmployee = employee;
                    this.showEmployeeScreen();
                } else {
                    this.showError('PIN incorrecto');
                    this.pin = '';
                    this.updatePinDisplay();
                }
            },
            
            showError(msg) {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.textContent = '❌ ' + msg;
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            },
            
            showSuccess(msg) {
                const successMsg = document.getElementById('successMsg');
                successMsg.textContent = '✅ ' + msg;
                successMsg.style.display = 'block';
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 3000);
            },
            
            showEmployeeScreen() {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('employeeScreen').style.display = 'block';
                document.getElementById('employeeName').textContent = this.currentEmployee.name;
                
                this.updateEmployeeHours();
                this.clearPin();
            },
            
            updateEmployeeHours() {
                const weekStart = this.getWeekStart();
                const weekAttendances = this.attendances.filter(a => 
                    a.employeeId === this.currentEmployee.id && 
                    new Date(a.date) >= weekStart
                );
                
                const dayNames = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
                const hoursByDay = {};
                let totalHours = 0;
                
                // Agrupar por día
                weekAttendances.forEach(a => {
                    if (a.checkOut) {
                        const hours = this.calculateHours(a.checkIn, a.checkOut);
                        const dayName = dayNames[new Date(a.date).getDay()];
                        hoursByDay[dayName] = (hoursByDay[dayName] || 0) + hours;
                        totalHours += hours;
                    }
                });
                
                // Mostrar horas (Lunes a Domingo)
                let html = '';
                for (let i = 1; i <= 7; i++) {
                    const day = dayNames[i % 7];
                    const hours = hoursByDay[day] || 0;
                    html += `
                        <div class="hour-row">
                            <span class="hour-day">${day}:</span>
                            <span class="hour-value">${hours.toFixed(1)} hrs</span>
                        </div>
                    `;
                }
                
                document.getElementById('hoursList').innerHTML = html;
                document.getElementById('totalHours').textContent = totalHours.toFixed(1) + ' hrs';
                
                // Última entrada
                const today = new Date().toISOString().split('T')[0];
                const todayAttendances = this.attendances.filter(a => 
                    a.employeeId === this.currentEmployee.id && a.date === today
                );
                
                if (todayAttendances.length > 0) {
                    const last = todayAttendances[todayAttendances.length - 1];
                    const type = last.checkOut ? 'Salida' : 'Entrada';
                    const time = last.checkOut || last.checkIn;
                    document.getElementById('lastEntry').textContent = `Última ${type}: Hoy ${time}`;
                } else {
                    document.getElementById('lastEntry').textContent = 'Sin registros hoy';
                }
            },
            
            isLate(checkInTime) {
                if (!checkInTime) return false;
                
                const [startHour, startMin] = this.workConfig.startTime.split(':').map(Number);
                const [checkHour, checkMin] = checkInTime.split(':').map(Number);
                
                const startMinutes = startHour * 60 + startMin;
                const checkMinutes = checkHour * 60 + checkMin;
                
                const diff = checkMinutes - startMinutes;
                
                return diff > this.workConfig.lateTolerance;
            },
            
            checkIn() {
                const now = new Date();
                const date = now.toISOString().split('T')[0];
                const time = now.toTimeString().split(' ')[0].substring(0, 5);
                
                // Verificar si ya hay entrada hoy sin salida
                const todayAttendances = this.attendances.filter(a => 
                    a.employeeId === this.currentEmployee.id && a.date === date
                );
                
                const hasOpenEntry = todayAttendances.some(a => !a.checkOut);
                
                if (hasOpenEntry) {
                    this.showError('Ya tienes una entrada registrada sin salida');
                    return;
                }
                
                this.attendances.push({
                    id: Date.now(),
                    employeeId: this.currentEmployee.id,
                    employeeName: this.currentEmployee.name,
                    date: date,
                    checkIn: time,
                    checkOut: null
                });
                
                this.save();
                this.exportDaily();
                
                // Verificar si llegó tarde
                const late = this.isLate(time);
                if (late) {
                    this.showError(`⚠️ LLEGASTE TARDE\nHora oficial: ${this.workConfig.startTime}\nTu entrada: ${time}`);
                } else {
                    this.showSuccess('Entrada registrada: ' + time);
                }
                
                this.updateEmployeeHours();
                
                setTimeout(() => this.logout(), 3000);
            },
            
            checkOut() {
                const now = new Date();
                const date = now.toISOString().split('T')[0];
                const time = now.toTimeString().split(' ')[0].substring(0, 5);
                
                // Buscar entrada sin salida
                const openEntry = this.attendances.find(a => 
                    a.employeeId === this.currentEmployee.id && 
                    a.date === date && 
                    !a.checkOut
                );
                
                if (!openEntry) {
                    this.showError('No tienes una entrada registrada hoy');
                    return;
                }
                
                openEntry.checkOut = time;
                openEntry.hours = this.calculateHours(openEntry.checkIn, openEntry.checkOut);
                
                this.save();
                this.exportDaily();
                
                // Calcular horas de la semana
                const weekStart = this.getWeekStart();
                const weekEnd = new Date(weekStart);
                weekEnd.setDate(weekStart.getDate() + 6);
                weekEnd.setHours(23, 59, 59, 999);
                
                const weekHours = this.attendances
                    .filter(a => {
                        const attDate = new Date(a.date + 'T00:00:00');
                        return a.employeeId === this.currentEmployee.id && 
                               attDate >= weekStart && 
                               attDate <= weekEnd &&
                               a.hours;
                    })
                    .reduce((sum, a) => sum + a.hours, 0);
                
                const message = `✅ Salida Registrada\n\n📊 HOY TRABAJASTE:\n   ${openEntry.hours.toFixed(1)} horas\n\n📈 ESTA SEMANA:\n   ${weekHours.toFixed(1)} horas`;
                
                alert(message);
                
                setTimeout(() => this.logout(), 1000);
            },
            
            calculateHours(checkIn, checkOut) {
                const [inH, inM] = checkIn.split(':').map(Number);
                const [outH, outM] = checkOut.split(':').map(Number);
                
                const inMinutes = inH * 60 + inM;
                const outMinutes = outH * 60 + outM;
                
                return (outMinutes - inMinutes) / 60;
            },
            
            getWeekStart() {
                const now = new Date();
                const day = now.getDay();
                const diff = day === 0 ? -6 : 1 - day; // Lunes como inicio
                const monday = new Date(now);
                monday.setDate(now.getDate() + diff);
                monday.setHours(0, 0, 0, 0);
                return monday;
            },
            
            showAdminScreen() {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('employeeScreen').style.display = 'none';
                document.getElementById('adminScreen').style.display = 'block';
                
                this.updateAdminStats();
                this.clearPin();
            },
            
            updateAdminStats() {
                const weekStart = this.getWeekStart();
                const weekEnd = new Date(weekStart);
                weekEnd.setDate(weekStart.getDate() + 6);
                weekEnd.setHours(23, 59, 59, 999);
                
                // Calcular horas por empleado esta semana
                const employeeHours = {};
                this.employees.forEach(emp => {
                    const empWeekAtt = this.attendances.filter(a => {
                        const date = new Date(a.date + 'T00:00:00');
                        return a.employeeId === emp.id && 
                               date >= weekStart && 
                               date <= weekEnd &&
                               a.hours;
                    });
                    const totalHours = empWeekAtt.reduce((sum, a) => sum + a.hours, 0);
                    if (totalHours > 0) {
                        employeeHours[emp.id] = {
                            name: emp.name,
                            hours: totalHours
                        };
                    }
                });
                
                // Empleado con más horas
                const employees = Object.values(employeeHours);
                if (employees.length > 0) {
                    const topEmp = employees.reduce((max, emp) => 
                        emp.hours > max.hours ? emp : max
                    );
                    document.getElementById('adminTopEmployee').textContent = 
                        `${topEmp.name}: ${topEmp.hours.toFixed(1)} hrs`;
                    
                    // Promedio general
                    const avgHours = employees.reduce((sum, emp) => sum + emp.hours, 0) / employees.length;
                    document.getElementById('adminAvgHours').textContent = avgHours.toFixed(1) + ' hrs';
                    
                    // Empleados cerca de overtime (>38 hrs)
                    const overtimeThreshold = 38;
                    const nearOT = employees.filter(emp => emp.hours >= overtimeThreshold);
                    
                    if (nearOT.length > 0) {
                        document.getElementById('adminOvertimeList').style.display = 'block';
                        let html = '';
                        nearOT.forEach(emp => {
                            html += `<div style="padding: 5px 0;">• ${emp.name}: ${emp.hours.toFixed(1)} hrs</div>`;
                        });
                        document.getElementById('overtimeEmployees').innerHTML = html;
                    } else {
                        document.getElementById('adminOvertimeList').style.display = 'none';
                    }
                } else {
                    document.getElementById('adminTopEmployee').textContent = 'Sin registros';
                    document.getElementById('adminAvgHours').textContent = '0 hrs';
                    document.getElementById('adminOvertimeList').style.display = 'none';
                }
            },
            
            // MANUAL ATTENDANCE
            toggleManualForm() {
                const form = document.getElementById('manualForm');
                if (form.style.display === 'none') {
                    // Mostrar formulario
                    form.style.display = 'block';
                    
                    // Poblar empleados
                    const select = document.getElementById('manualEmpSelect');
                    select.innerHTML = '<option value="">Selecciona empleado</option>';
                    this.employees.forEach(emp => {
                        select.innerHTML += `<option value="${emp.id}">${emp.name}</option>`;
                    });
                    
                    // Fecha de hoy
                    document.getElementById('manualDate').value = new Date().toISOString().split('T')[0];
                    document.getElementById('manualCheckIn').value = '';
                    document.getElementById('manualCheckOut').value = '';
                    document.getElementById('manualHours').textContent = '-';
                    
                    // Listeners para calcular horas
                    document.getElementById('manualCheckIn').onchange = () => this.updateManualHours();
                    document.getElementById('manualCheckOut').onchange = () => this.updateManualHours();
                } else {
                    // Ocultar formulario
                    form.style.display = 'none';
                }
            },
            
            updateManualHours() {
                const checkIn = document.getElementById('manualCheckIn').value;
                const checkOut = document.getElementById('manualCheckOut').value;
                
                if (checkIn && checkOut) {
                    const [inH, inM] = checkIn.split(':').map(Number);
                    const [outH, outM] = checkOut.split(':').map(Number);
                    const hours = (outH + outM/60) - (inH + inM/60);
                    document.getElementById('manualHours').textContent = hours.toFixed(2) + ' hrs';
                } else {
                    document.getElementById('manualHours').textContent = '-';
                }
            },
            
            saveManualAttendance() {
                const empId = document.getElementById('manualEmpSelect').value;
                const date = document.getElementById('manualDate').value;
                const checkIn = document.getElementById('manualCheckIn').value;
                const checkOut = document.getElementById('manualCheckOut').value;
                
                if (!empId || !date || !checkIn) {
                    alert('Por favor completa al menos: Empleado, Fecha y Hora de entrada');
                    return;
                }
                
                const emp = this.employees.find(e => e.id === empId);
                
                // Calcular horas
                let hours = 0;
                if (checkIn && checkOut) {
                    const [inH, inM] = checkIn.split(':').map(Number);
                    const [outH, outM] = checkOut.split(':').map(Number);
                    hours = (outH + outM/60) - (inH + inM/60);
                }
                
                // Agregar registro
                this.attendances.push({
                    id: 'att' + Date.now(),
                    employeeId: empId,
                    employeeName: emp.name,
                    date,
                    checkIn,
                    checkOut,
                    hours: checkOut ? hours : null
                });
                
                this.save();
                alert('✅ Registro agregado correctamente');
                this.toggleManualForm();
                this.updateAdminStats();
            },
            
            adminExportWeek() {
                this.downloadWeekly();
                this.showSuccess('Archivo de la semana descargado');
            },
            
            adminExportAll() {
                const exportData = {
                    employees: this.employees,
                    attendances: this.attendances,
                    exportDate: new Date().toISOString(),
                    exportType: 'complete'
                };
                
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `reloj_completo_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                
                this.showSuccess('Datos completos exportados');
            },
            
            adminViewAll() {
                if (this.attendances.length === 0) {
                    alert('No hay registros para mostrar');
                    return;
                }
                
                let report = '📋 TODOS LOS REGISTROS\n\n';
                
                const sorted = [...this.attendances].sort((a, b) => new Date(b.date) - new Date(a.date));
                
                sorted.forEach(att => {
                    report += `${att.employeeName}\n`;
                    report += `Fecha: ${new Date(att.date).toLocaleDateString('es-MX')}\n`;
                    report += `Entrada: ${att.checkIn} | Salida: ${att.checkOut || 'Pendiente'}\n`;
                    report += `Horas: ${att.hours ? att.hours.toFixed(1) : '-'} hrs\n`;
                    report += '-------------------\n';
                });
                
                alert(report);
            },
            
            logout() {
                this.currentEmployee = null;
                this.clearPin();
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('employeeScreen').style.display = 'none';
                document.getElementById('adminScreen').style.display = 'none';
            },
            
            openAdmin() {
                alert('Para acceder al panel de administrador:\n\n1. Ingresa el PIN: 0000\n2. Verás las opciones de exportar y estadísticas\n\n💡 Puedes cambiar el PIN desde la App de Nómina');
            },
            
            importAttendancesFromNomina() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = (e) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            
                            // Validate format
                            if (!data.attendances || !Array.isArray(data.attendances)) {
                                alert('❌ Archivo inválido. Usa el archivo exportado desde la App de Nómina.');
                                return;
                            }
                            
                            let added = 0;
                            let skipped = 0;
                            
                            data.attendances.forEach(att => {
                                // Check for duplicates by employeeId + date
                                const exists = this.attendances.find(a => 
                                    a.employeeId === att.employeeId && a.date === att.date
                                );
                                if (exists) {
                                    skipped++;
                                } else {
                                    this.attendances.push({
                                        id: att.id || ('att' + Date.now() + Math.random()),
                                        employeeId: att.employeeId,
                                        employeeName: att.employeeName,
                                        date: att.date,
                                        checkIn: att.checkIn,
                                        checkOut: att.checkOut,
                                        hours: att.hours
                                    });
                                    added++;
                                }
                            });
                            
                            this.save();
                            this.updateAdminStats();
                            alert(`✅ Importación completada\n\n` +
                                  `✅ Agregados: ${added} registros\n` +
                                  `⏭️ Omitidos (ya existían): ${skipped} registros`);
                        } catch (err) {
                            alert('❌ Error al importar: ' + err.message);
                        }
                    };
                    reader.readAsText(e.target.files[0]);
                };
                input.click();
            },

            importConfig() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                
                input.onchange = (e) => {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            
                            if (data.employees) {
                                this.employees = data.employees;
                            }
                            
                            if (data.adminPin) {
                                this.adminPin = data.adminPin;
                            }
                            
                            if (data.workConfig) {
                                this.workConfig = data.workConfig;
                            }
                            
                            this.save();
                            alert('✅ Configuración importada correctamente\n\n' +
                                  `Empleados: ${this.employees.length}\n` +
                                  `PIN Admin: ${this.adminPin}\n` +
                                  `Hora entrada: ${this.workConfig.startTime}`);
                        } catch (err) {
                            alert('❌ Error al importar: ' + err.message);
                        }
                    };
                    reader.readAsText(e.target.files[0]);
                };
                
                input.click();
            },
            
            save() {
                localStorage.setItem('waco_employees', JSON.stringify(this.employees));
                localStorage.setItem('waco_attendances', JSON.stringify(this.attendances));
                localStorage.setItem('waco_adminPin', this.adminPin);
                localStorage.setItem('waco_workConfig', JSON.stringify(this.workConfig));
            },
            
            loadData() {
                // MIGRACIÓN AUTOMÁTICA: Importar datos de versiones anteriores
                if (!localStorage.getItem('waco_employees')) {
                    const oldKeys = ['rc_employees', 'employees', 'reloj_employees', 'checador_employees'];
                    for (const key of oldKeys) {
                        const oldData = localStorage.getItem(key);
                        if (oldData) {
                            localStorage.setItem('waco_employees', oldData);
                            console.log('✅ Empleados migrados desde', key);
                            break;
                        }
                    }
                }
                
                if (!localStorage.getItem('waco_attendances')) {
                    const oldKeys = ['rc_attendances', 'attendances', 'reloj_attendances', 'checador_attendances'];
                    for (const key of oldKeys) {
                        const oldData = localStorage.getItem(key);
                        if (oldData) {
                            localStorage.setItem('waco_attendances', oldData);
                            console.log('✅ Asistencias migradas desde', key);
                            break;
                        }
                    }
                }
                
                if (!localStorage.getItem('waco_adminPin')) {
                    const oldKeys = ['rc_adminPin', 'adminPin', 'reloj_adminPin', 'checador_adminPin'];
                    for (const key of oldKeys) {
                        const oldData = localStorage.getItem(key);
                        if (oldData) {
                            localStorage.setItem('waco_adminPin', oldData);
                            console.log('✅ PIN admin migrado desde', key);
                            break;
                        }
                    }
                }
                
                // Cargar datos normalmente
                this.employees = JSON.parse(localStorage.getItem('waco_employees') || '[]');
                this.attendances = JSON.parse(localStorage.getItem('waco_attendances') || '[]');
                this.adminPin = localStorage.getItem('waco_adminPin') || '0000';
                this.workConfig = JSON.parse(localStorage.getItem('waco_workConfig') || '{"startTime":"08:00","lateTolerance":15}');
            },
            
            exportDaily() {
                // Preparar datos para exportar
                const today = new Date().toISOString().split('T')[0];
                const todayAttendances = this.attendances.filter(a => a.date === today);
                
                const exportData = {
                    fecha: today,
                    registros: todayAttendances
                };
                
                // Guardar en localStorage con prefijo para que la app de nómina lo lea
                const allExports = JSON.parse(localStorage.getItem('waco_exports') || '{}');
                allExports[today] = exportData;
                localStorage.setItem('waco_exports', JSON.stringify(allExports));
                
                console.log('📤 Exportado:', today);
            },
            
            downloadWeekly() {
                const weekStart = this.getWeekStart();
                const weekAttendances = this.attendances.filter(a => new Date(a.date) >= weekStart);
                
                const exportData = {
                    periodo: `${weekStart.toISOString().split('T')[0]} a ${new Date().toISOString().split('T')[0]}`,
                    registros: weekAttendances
                };
                
                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `asistencias_semana_${weekStart.toISOString().split('T')[0]}.json`;
                a.click();
            }
        };
        
        app.init();
    </script>
</body>
</html>
